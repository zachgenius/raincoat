<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Minimal fontconfig for Raincoat's sandbox. Purpose: present a small, generic
  font view so a sandboxed tool cannot easily fingerprint the host's full font
  list. This file is copied into <sandbox>/fontconfig/fonts.conf at run time.

  NOTE: the runner tmpfs-masks /usr/share/fonts and re-binds only the curated
  generic dirs (dejavu/noto) read-only, so scanning /usr/share/fonts below only
  ever enumerates that curated set — not the host's real font tree.
-->
<fontconfig>
  <!-- Only look at a couple of standard, widely-available system font dirs. -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>

  <!-- Cache lives on a writable tmp path inside the sandbox. fontconfig does not
       expand "~" here, so an absolute path is used to avoid a literal "~" dir. -->
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <!-- The curated dejavu dir also ships DejaVuMathTeXGyre.ttf, a math/symbol face
       that fontconfig otherwise treats as a sans candidate. Without the host's
       /etc/fonts conf.d strong bindings, the weak sans-serif alias below can lose
       to it, so `fc-match sans-serif` collapses onto the math face. Reject it from
       the set entirely so it can never satisfy a generic-family query. -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>DejaVu Math TeX Gyre</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!-- Pin the generic families to real body faces with a STRONG binding so they
       win regardless of what else is present in the curated dirs. -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans</string>
      <string>DejaVu Sans</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif</string>
      <string>DejaVu Serif</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Mono</string>
      <string>DejaVu Sans Mono</string>
    </edit>
  </match>
  <!-- Emoji needs the same STRONG pin as the other generics: with only the weak
       alias below, `fc-match emoji` loses to DejaVu Sans even though Noto Color
       Emoji is present and enumerated. Prepend the real emoji face strongly. -->
  <match target="pattern">
    <test name="family"><string>emoji</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Generic aliases resolve to neutral, commonly present families. -->
  <alias>
    <family>serif</family>
    <prefer><family>Noto Serif</family><family>DejaVu Serif</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Noto Sans</family><family>DejaVu Sans</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Noto Sans Mono</family><family>DejaVu Sans Mono</family></prefer>
  </alias>
  <alias>
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
</fontconfig>
